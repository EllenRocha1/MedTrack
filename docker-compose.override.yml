services:
  backend:
    build:
      context: .
      target: build
    volumes:
      - .:/app
      - ~/.m2:/root/.m2  # cache do Maven entre rebuilds
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    entrypoint: ["sh", "-c"]
    command: ["chmod +x mvnw && ./mvnw spring-boot:run"]

  frontend:
    volumes:
      - ./interface-react:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_BACKEND_URL=http://localhost:8081
      - REACT_APP_FRONTEND_URL=http://localhost:3000
    command: npm start
